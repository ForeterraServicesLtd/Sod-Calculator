<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foreterra Services — Quote Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a6b3c;
    --slate: #2c3040;
    --slate-mid: #4a5068;
    --slate-light: #8892a8;
    --border: #dde2ec;
    --surface: #f7f8fc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--slate); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .logo-mark { width: 40px; height: 40px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 22px; height: 22px; fill: white; }
  .logo h1 { font-size: 22px; font-weight: 500; }
  .tagline { font-size: 13px; color: var(--slate-light); margin-bottom: 40px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; max-width: 640px; width: 100%; }
  .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 24px; text-decoration: none; color: var(--slate); transition: border-color 0.15s, box-shadow 0.15s; }
  .card:hover { border-color: var(--green); box-shadow: 0 4px 12px rgba(26,107,60,0.1); }
  .card-title { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .card-desc { font-size: 12px; color: var(--slate-mid); line-height: 1.5; }
</style>
</head>
<body>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-9v4h4l-5 9z"/></svg>
    </div>
    <h1>Foreterra Services</h1>
  </div>
  <p class="tagline">Internal Quote Tools</p>
  <div class="cards">
    <a class="card" href="sod-calculator/">
      <div class="card-title">Sod Installation</div>
      <div class="card-desc">Full quote engine for sod removal, grading, installation, materials, equipment, and margins.</div>
    </a>
    <a class="card" href="lot-sweeping/">
      <div class="card-title">Lot Sweeping</div>
      <div class="card-desc">Spring cleanup quote engine with skid steer and push sweeper rates, equipment, and fixed costs.</div>
    </a>
  </div>
</body>
</html>
