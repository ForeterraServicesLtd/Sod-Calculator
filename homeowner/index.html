<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foreterra — Homeowner Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --green: #1a6b3c; --green-pale: #eaf4ee; --blue: #1a3a6b; --blue-pale: #eaeff8; --amber: #7a4a0a; --slate: #2c3040; --slate-mid: #4a5068; --slate-light: #8892a8; --border: #dde2ec; --surface: #f7f8fc; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--surface); color: var(--slate); min-height: 100vh; display: flex; flex-direction: column; }
  .header { background: var(--slate); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--green); }
  .header-logo { display: flex; align-items: center; gap: 12px; }
  .header-logo .mark { width: 26px; height: 26px; background: var(--green); border-radius: 5px; display: flex; align-items: center; justify-content: center; }
  .header-logo .mark svg { width: 14px; height: 14px; fill: white; }
  .header-logo h1 { font-size: 13px; font-weight: 500; color: white; }
  .header-logo span { font-size: 10px; color: rgba(255,255,255,0.5); display: block; }
  .header-nav { display: flex; gap: 6px; }
  .nav-btn { display: flex; align-items: center; gap: 4px; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 10px; font-family: var(--font); padding: 4px 8px; border: 1px solid rgba(255,255,255,0.15); border-radius: 5px; background: none; cursor: pointer; white-space: nowrap; }
  .nav-btn:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.3); }
  .nav-btn.active { color: white; border-color: var(--green); background: rgba(26,107,60,0.2); }
  .nav-btn svg { width: 12px; height: 12px; fill: currentColor; }
  .content { flex: 1; max-width: 700px; margin: 0 auto; width: 100%; padding: 30px 20px; }
  .page-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .page-sub { font-size: 13px; color: var(--slate-light); margin-bottom: 24px; }
  .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 16px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 11px; font-weight: 500; color: var(--slate-mid); margin-bottom: 4px; display: block; }
  .form-input { width: 100%; font-family: var(--mono); font-size: 12px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--slate); outline: none; }
  .form-input:focus { border-color: var(--green); background: white; }
  .btn { width: 100%; padding: 12px; background: var(--green); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; font-family: var(--font); cursor: pointer; margin-top: 12px; }
  .btn:hover { background: #14572f; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--slate-mid); }
  .btn-outline:hover { background: var(--surface); }
  .msg { font-size: 12px; margin-top: 10px; text-align: center; padding: 8px; border-radius: 6px; }
  .msg.error { color: #8a1a1a; background: #fdeaea; }
  .msg.success { color: var(--green); background: var(--green-pale); }
  .tab-bar { display: flex; gap: 6px; margin-bottom: 20px; }
  .tab { padding: 8px 16px; font-size: 12px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; background: white; color: var(--slate-mid); font-family: var(--font); }
  .tab.active { background: var(--green); color: white; border-color: var(--green); }
  .hidden { display: none; }

  .job-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: white; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; cursor: pointer; text-decoration: none; color: var(--slate); transition: border-color 0.15s; }
  .job-item:hover { border-color: var(--green); }
  .job-title { font-size: 13px; font-weight: 500; }
  .job-meta { font-size: 10px; color: var(--slate-light); margin-top: 2px; }
  .job-bids { font-family: var(--mono); font-size: 12px; color: var(--green); font-weight: 500; }

  .welcome-name { color: var(--green); }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
  .stat-val { font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--green); }
  .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--slate-light); margin-top: 2px; }
  @media (max-width: 768px) {
    .header { flex-direction: column; gap: 8px; padding: 8px 12px; }
    .header-nav { flex-wrap: wrap; justify-content: center; }
    .content { padding: 20px 16px; }
    .stats { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="mark">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-9v4h4l-5 9z"/></svg>
    </div>
    <div>
      <h1>Foreterra Services</h1>
      <span>Homeowner Portal</span>
    </div>
  </div>
  <div class="header-nav">
    <a class="nav-btn" href="../">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Home
    </a>
    <a class="nav-btn" href="../post-job/">Post a Job</a>
    <a class="nav-btn" href="../inbox/">Inbox</a>
    <a class="nav-btn active" href="../homeowner/">My Account</a>
  </div>
</div>

<div class="content">

  <!-- Auth section -->
  <div id="auth-section">
    <h1 class="page-title">Homeowner Portal</h1>
    <p class="page-sub">Sign up or log in to manage your jobs and track bids from contractors.</p>

    <div class="tab-bar">
      <button class="tab active" onclick="showTab('signup')">Sign Up</button>
      <button class="tab" onclick="showTab('login')">Log In</button>
    </div>

    <div class="card" id="signup-form">
      <div class="form-group">
        <label class="form-label">Full name</label>
        <input class="form-input" type="text" id="s-name" placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="s-email" placeholder="jane@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" type="tel" id="s-phone" placeholder="587-555-1234">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="s-password" placeholder="Min 6 characters">
      </div>
      <button class="btn" id="signup-btn" onclick="handleSignup()">Create Account</button>
      <div id="signup-msg"></div>
    </div>

    <div class="card hidden" id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="l-email" placeholder="jane@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="l-password" placeholder="Your password">
      </div>
      <button class="btn" id="login-btn" onclick="handleLogin()">Log In</button>
      <div id="login-msg"></div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard-section" class="hidden">
    <h1 class="page-title">Welcome, <span class="welcome-name" id="d-name"></span></h1>
    <p class="page-sub" id="d-email"></p>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-val" id="stat-jobs">0</div>
        <div class="stat-label">Jobs Posted</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-bids">0</div>
        <div class="stat-label">Total Bids</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-accepted">0</div>
        <div class="stat-label">Accepted</div>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:20px;">
      <a class="btn" href="../post-job/" style="text-align:center;text-decoration:none;display:block;">Post a New Job</a>
      <a class="btn btn-outline" href="../inbox/" style="text-align:center;text-decoration:none;display:block;">Inbox</a>
    </div>

    <h2 style="font-size:14px;font-weight:500;margin-bottom:12px;">My Jobs</h2>
    <div id="my-jobs">
      <p style="font-size:12px;color:var(--slate-light);">Loading...</p>
    </div>

    <button class="btn btn-outline" style="margin-top:24px;" onclick="handleLogout()">Log Out</button>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://prripeyvxhnqxdcrrmdw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBycmlwZXl2eGhucXhkY3JybWR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODQ0NTksImV4cCI6MjA5MDY2MDQ1OX0.LL7zKnUzMZPp8wynmXPRl21g8VEjpsk3y8C2spRCswQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showTab(tab) {
  document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (tab === 'signup' && i === 0) || (tab === 'login' && i === 1)));
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = text;
}

async function handleSignup() {
  const name = document.getElementById('s-name').value.trim();
  const email = document.getElementById('s-email').value.trim();
  const phone = document.getElementById('s-phone').value.trim();
  const password = document.getElementById('s-password').value;

  if (!name || !email || !password) return showMsg('signup-msg', 'Name, email, and password are required.', 'error');
  if (password.length < 6) return showMsg('signup-msg', 'Password must be at least 6 characters.', 'error');

  document.getElementById('signup-btn').disabled = true;

  const { data: authData, error: authError } = await sb.auth.signUp({ email, password });
  if (authError) {
    document.getElementById('signup-btn').disabled = false;
    return showMsg('signup-msg', authError.message, 'error');
  }

  // Create profile
  await sb.from('profiles').insert({
    id: authData.user.id,
    role: 'homeowner',
    full_name: name,
    email,
    phone
  });

  const user = { id: authData.user.id, name, email, phone };
  localStorage.setItem('ft_homeowner', JSON.stringify(user));
  showDashboard(user);
}

async function handleLogin() {
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-password').value;

  if (!email || !password) return showMsg('login-msg', 'Email and password required.', 'error');

  document.getElementById('login-btn').disabled = true;

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById('login-btn').disabled = false;
    return showMsg('login-msg', error.message, 'error');
  }

  const { data: profile } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
  const user = {
    id: data.user.id,
    name: profile?.full_name || email,
    email: profile?.email || email,
    phone: profile?.phone || ''
  };
  localStorage.setItem('ft_homeowner', JSON.stringify(user));
  showDashboard(user);
}

function handleLogout() {
  sb.auth.signOut();
  localStorage.removeItem('ft_homeowner');
  document.getElementById('auth-section').classList.remove('hidden');
  document.getElementById('dashboard-section').classList.add('hidden');
  document.getElementById('signup-btn').disabled = false;
  document.getElementById('login-btn').disabled = false;
}

async function showDashboard(user) {
  document.getElementById('auth-section').classList.add('hidden');
  document.getElementById('dashboard-section').classList.remove('hidden');
  document.getElementById('d-name').textContent = user.name;
  document.getElementById('d-email').textContent = user.email;

  // Load jobs by email
  const { data: jobs } = await sb.from('jobs').select('*').eq('contact_email', user.email).order('created_at', { ascending: false });

  const jobList = jobs || [];
  document.getElementById('stat-jobs').textContent = jobList.length;

  // Get bid counts
  const jobIds = jobList.map(j => j.id);
  let allBids = [];
  if (jobIds.length > 0) {
    const { data: bids } = await sb.from('bids').select('job_id, status').in('job_id', jobIds);
    allBids = bids || [];
  }

  const bidCounts = {};
  allBids.forEach(b => { bidCounts[b.job_id] = (bidCounts[b.job_id] || 0) + 1; });

  document.getElementById('stat-bids').textContent = allBids.length;
  document.getElementById('stat-accepted').textContent = allBids.filter(b => b.status === 'accepted').length;

  const container = document.getElementById('my-jobs');
  if (jobList.length === 0) {
    container.innerHTML = '<p style="font-size:12px;color:var(--slate-light);">No jobs posted yet. <a href="../post-job/" style="color:var(--green);">Post your first job</a>.</p>';
    return;
  }

  container.innerHTML = jobList.map(j => {
    const count = bidCounts[j.id] || 0;
    const date = new Date(j.created_at).toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
    const statusColor = j.status === 'open' ? 'var(--green)' : j.status === 'completed' ? 'var(--blue)' : 'var(--slate-light)';
    return `
      <a class="job-item" href="../job/?id=${j.id}">
        <div>
          <div class="job-title">${j.title}</div>
          <div class="job-meta">${j.service_type} · ${j.location} · ${date} · <span style="color:${statusColor};">${j.status}</span></div>
        </div>
        <div class="job-bids">${count} bid${count !== 1 ? 's' : ''}</div>
      </a>`;
  }).join('');
}

// Auto-login check
const saved = localStorage.getItem('ft_homeowner');
if (saved) {
  try {
    showDashboard(JSON.parse(saved));
  } catch (e) { localStorage.removeItem('ft_homeowner'); }
}
</script>
</body>
</html>
