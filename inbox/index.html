<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foreterra — Inbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --green: #1a6b3c; --green-pale: #eaf4ee; --blue: #1a3a6b; --blue-pale: #eaeff8; --amber: #7a4a0a; --amber-pale: #fdf0de; --red: #8a1a1a; --red-pale: #fdeaea; --slate: #2c3040; --slate-mid: #4a5068; --slate-light: #8892a8; --border: #dde2ec; --surface: #f7f8fc; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--surface); color: var(--slate); min-height: 100vh; display: flex; flex-direction: column; }
  .header { background: var(--slate); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--green); }
  .header-logo { display: flex; align-items: center; gap: 12px; }
  .header-logo .mark { width: 26px; height: 26px; background: var(--green); border-radius: 5px; display: flex; align-items: center; justify-content: center; }
  .header-logo .mark svg { width: 14px; height: 14px; fill: white; }
  .header-logo h1 { font-size: 13px; font-weight: 500; color: white; }
  .header-logo span { font-size: 10px; color: rgba(255,255,255,0.5); display: block; }
  .header-nav { display: flex; gap: 6px; }
  .nav-btn { display: flex; align-items: center; gap: 4px; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 10px; font-family: var(--font); padding: 4px 8px; border: 1px solid rgba(255,255,255,0.15); border-radius: 5px; background: none; cursor: pointer; white-space: nowrap; }
  .nav-btn:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.3); }
  .nav-btn.active { color: white; border-color: var(--green); background: rgba(26,107,60,0.2); }
  .nav-btn svg { width: 12px; height: 12px; fill: currentColor; }

  .content { flex: 1; max-width: 600px; margin: 0 auto; width: 100%; padding: 30px 20px; }
  .page-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .page-sub { font-size: 13px; color: var(--slate-light); margin-bottom: 24px; }

  .lookup-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  .lookup-row { display: flex; gap: 8px; }
  .form-input { flex: 1; font-family: var(--mono); font-size: 12px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--slate); outline: none; }
  .form-input:focus { border-color: var(--green); background: white; }
  .btn { padding: 8px 16px; background: var(--green); color: white; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; font-family: var(--font); cursor: pointer; }
  .btn:hover { background: #14572f; }

  .unread-badge { display: inline-block; font-size: 10px; font-weight: 500; color: white; background: var(--green); border-radius: 10px; padding: 1px 8px; margin-left: 6px; }
  .mark-all { font-size: 11px; color: var(--green); cursor: pointer; background: none; border: none; font-family: var(--font); }
  .mark-all:hover { text-decoration: underline; }

  .notif { display: flex; gap: 12px; padding: 14px 16px; background: white; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s; text-decoration: none; color: var(--slate); }
  .notif:hover { border-color: var(--green); }
  .notif.unread { border-left: 3px solid var(--green); background: var(--green-pale); }
  .notif-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .notif-icon svg { width: 16px; height: 16px; }
  .notif-icon.bid { background: var(--blue-pale); }
  .notif-icon.bid svg { fill: var(--blue); }
  .notif-icon.accepted { background: var(--green-pale); }
  .notif-icon.accepted svg { fill: var(--green); }
  .notif-icon.rejected { background: var(--red-pale); }
  .notif-icon.rejected svg { fill: var(--red); }
  .notif-body { flex: 1; min-width: 0; }
  .notif-msg { font-size: 12px; line-height: 1.5; }
  .notif-msg strong { font-weight: 500; }
  .notif-time { font-size: 10px; color: var(--slate-light); margin-top: 3px; }

  .empty { text-align: center; padding: 32px; color: var(--slate-light); font-size: 13px; }
  .section-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="mark">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-9v4h4l-5 9z"/></svg>
    </div>
    <div>
      <h1>Foreterra Services</h1>
      <span>Inbox</span>
    </div>
  </div>
  <div class="header-nav">
    <a class="nav-btn" href="../">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Home
    </a>
    <a class="nav-btn" href="../jobs/">Job Board</a>
    <a class="nav-btn" href="../post-job/">Post a Job</a>
    <a class="nav-btn active" href="../inbox/">Inbox</a>
  </div>
</div>

<div class="content">
  <h1 class="page-title">Inbox</h1>
  <p class="page-sub">Check for new bids on your jobs or updates on your bid submissions.</p>

  <div class="lookup-card">
    <div class="lookup-row">
      <input class="form-input" type="email" id="email-input" placeholder="Enter your email">
      <button class="btn" onclick="loadInbox()">Check</button>
    </div>
  </div>

  <div id="inbox-content" style="display:none;">
    <div class="section-bar">
      <div>
        <strong style="font-size:13px;">Notifications</strong>
        <span class="unread-badge" id="unread-badge" style="display:none;">0</span>
      </div>
      <button class="mark-all" id="mark-all-btn" onclick="markAllRead()" style="display:none;">Mark all read</button>
    </div>
    <div id="notif-list"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://prripeyvxhnqxdcrrmdw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBycmlwZXl2eGhucXhkY3JybWR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODQ0NTksImV4cCI6MjA5MDY2MDQ1OX0.LL7zKnUzMZPp8wynmXPRl21g8VEjpsk3y8C2spRCswQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentEmail = '';
let allNotifs = [];

// Auto-fill email from localStorage
const saved = localStorage.getItem('ft_inbox_email');
if (saved) {
  document.getElementById('email-input').value = saved;
  setTimeout(loadInbox, 100);
}

document.getElementById('email-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadInbox();
});

async function loadInbox() {
  currentEmail = document.getElementById('email-input').value.trim().toLowerCase();
  if (!currentEmail) return;

  localStorage.setItem('ft_inbox_email', currentEmail);

  const { data, error } = await sb.from('notifications')
    .select('*')
    .eq('recipient_email', currentEmail)
    .order('created_at', { ascending: false });

  allNotifs = data || [];
  document.getElementById('inbox-content').style.display = 'block';
  renderNotifs();
}

function renderNotifs() {
  const list = document.getElementById('notif-list');
  const unread = allNotifs.filter(n => !n.read).length;

  const badge = document.getElementById('unread-badge');
  const markBtn = document.getElementById('mark-all-btn');
  if (unread > 0) {
    badge.textContent = unread;
    badge.style.display = 'inline-block';
    markBtn.style.display = 'inline';
  } else {
    badge.style.display = 'none';
    markBtn.style.display = 'none';
  }

  if (allNotifs.length === 0) {
    list.innerHTML = '<div class="empty">No notifications yet.</div>';
    return;
  }

  const icons = {
    new_bid: { cls: 'bid', path: 'M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z' },
    bid_accepted: { cls: 'accepted', path: 'M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z' },
    bid_rejected: { cls: 'rejected', path: 'M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z' },
  };

  list.innerHTML = allNotifs.map(n => {
    const icon = icons[n.type] || icons.new_bid;
    const ago = timeAgo(n.created_at);
    const link = n.job_id ? `../job/?id=${n.job_id}` : '#';
    return `
      <a class="notif ${n.read ? '' : 'unread'}" href="${link}" onclick="markRead('${n.id}')">
        <div class="notif-icon ${icon.cls}">
          <svg viewBox="0 0 24 24"><path d="${icon.path}"/></svg>
        </div>
        <div class="notif-body">
          <div class="notif-msg">${n.message}</div>
          <div class="notif-time">${ago}</div>
        </div>
      </a>`;
  }).join('');
}

async function markRead(id) {
  await sb.from('notifications').update({ read: true }).eq('id', id);
}

async function markAllRead() {
  await sb.from('notifications').update({ read: true }).eq('recipient_email', currentEmail).eq('read', false);
  allNotifs.forEach(n => n.read = true);
  renderNotifs();
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + 'd ago';
  return new Date(dateStr).toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
}
</script>
</body>
</html>
