  .nav-btn.active { color: white; border-color: var(--green); background: rgba(26,107,60,0.2); }
  .nav-btn svg { width: 12px; height: 12px; fill: currentColor; flex-shrink: 0; }
  .dropdown { position: relative; }
  .dropdown-menu { display: none; position: absolute; top: 100%; right: 0; margin-top: 6px; background: var(--slate); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; min-width: 200px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 100; }
  .dropdown.open .dropdown-menu { display: block; }
  .dropdown-menu a { display: flex; align-items: center; gap: 8px; padding: 10px 14px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 11px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .dropdown-menu a:last-child { border-bottom: none; }
  .dropdown-menu a:hover { color: white; background: rgba(255,255,255,0.06); }
  [data-theme="dark"] { --slate: #e0e4ec; --slate-mid: #a0a8b8; --slate-light: #6a7488; --border: #2a2e3a; --surface: #14161c; }
  [data-theme="dark"] .header { background: #0e1016; }

  .content { flex: 1; padding: 40px 20px; max-width: 800px; margin: 0 auto; width: 100%; }

<script>
document.addEventListener('click', e => {
  document.querySelectorAll('.dropdown').forEach(dd => {
    if (!dd.contains(e.target)) dd.classList.remove('open');
  });
});
function setTheme(t) {
  if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  else document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('theme', t);
  document.getElementById('settings-dropdown').classList.remove('open');
}
if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
</script>
